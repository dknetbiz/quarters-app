<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1e3a8a"/>
  <!-- Building silhouette -->
  <rect x="14" y="26" width="36" height="26" rx="2" fill="#93c5fd"/>
  <!-- Roof triangle -->
  <polygon points="32,10 8,28 56,28" fill="#bfdbfe"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="14" rx="1.5" fill="#1e3a8a"/>
  <!-- Door knob -->
  <circle cx="36" cy="45" r="1.5" fill="#93c5fd"/>
  <!-- Windows -->
  <rect x="17" y="32" width="8" height="7" rx="1" fill="#1e40af"/>
  <rect x="39" y="32" width="8" height="7" rx="1" fill="#1e40af"/>
  <!-- Key symbol on door -->
  <circle cx="32" cy="44" r="2.5" fill="none" stroke="#bfdbfe" stroke-width="1.5"/>
  <line x1="32" y1="46.5" x2="32" y2="50" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30.5" y1="48.5" x2="33.5" y2="48.5" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
</svg>
